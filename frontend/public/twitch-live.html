<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETRADARMUS Twitch Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .stream {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 50%, #0a0a0a 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Manrope', sans-serif;
        }

        /* Animated Grid Background */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(57, 255, 20, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Glow Effects */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.25) 0%, transparent 60%);
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .glow-left {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 194, 255, 0.15) 0%, transparent 60%);
            bottom: -100px;
            left: -100px;
        }

        .glow-right {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.15) 0%, transparent 60%);
            bottom: -100px;
            right: -100px;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: #39FF14;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
        }

        .logo-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #fff;
        }

        /* Live Badge - Prominent */
        .live-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 6px;
            animation: livePulse 2s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #fff;
        }

        .viewer-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #A1A1AA;
        }

        /* Main Content - Center */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .show-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #39FF14;
            margin-bottom: 20px;
        }

        .show-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 140px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #fff;
            line-height: 0.95;
            margin-bottom: 30px;
            text-shadow: 0 0 60px rgba(57, 255, 20, 0.3);
        }

        .show-title .highlight {
            color: #39FF14;
            position: relative;
        }

        .show-subtitle {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 36px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #A1A1AA;
            margin-bottom: 50px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 60px;
            padding: 30px 60px;
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 600;
            color: #39FF14;
            margin-bottom: 4px;
        }

        .stat-value.blue {
            color: #00C2FF;
        }

        .stat-value.white {
            color: #EDEDED;
        }

        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #A1A1AA;
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .social-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #A1A1AA;
        }

        .social-info span {
            color: #39FF14;
        }

        .time-info {
            text-align: right;
        }

        .current-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 600;
            color: #fff;
        }

        .date-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #A1A1AA;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Decorative Elements */
        .corner-deco {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(57, 255, 20, 0.3);
        }

        .corner-deco.top-left {
            top: 30px;
            left: 30px;
            border-right: none;
            border-bottom: none;
        }

        .corner-deco.top-right {
            top: 30px;
            right: 30px;
            border-left: none;
            border-bottom: none;
        }

        .corner-deco.bottom-left {
            bottom: 30px;
            left: 30px;
            border-right: none;
            border-top: none;
        }

        .corner-deco.bottom-right {
            bottom: 30px;
            right: 30px;
            border-left: none;
            border-top: none;
        }

        /* Animated Line */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #39FF14, transparent);
            animation: scan 4s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="stream" id="stream">
        <!-- Background Effects -->
        <div class="grid-overlay"></div>
        <div class="glow"></div>
        <div class="glow-left"></div>
        <div class="glow-right"></div>
        <div class="scan-line"></div>

        <!-- Corner Decorations -->
        <div class="corner-deco top-left"></div>
        <div class="corner-deco top-right"></div>
        <div class="corner-deco bottom-left"></div>
        <div class="corner-deco bottom-right"></div>

        <!-- Content -->
        <div class="content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                    </div>
                    <span class="logo-text">Betradarmus</span>
                </div>

                <div class="live-container">
                    <span class="viewer-count">🔴 JETZT LIVE</span>
                    <div class="live-badge">
                        <div class="live-dot"></div>
                        <span class="live-text">Live</span>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <div class="show-label">⚽ Live-Fußball-Talk</div>
                <h1 class="show-title">
                    Dies, Das,<br>
                    <span class="highlight">Doppelpass</span>
                </h1>
                <p class="show-subtitle">KI-gestützte Live-Analyse & Diskussion</p>

                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value">47</div>
                        <div class="stat-label">Live Spiele</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">12</div>
                        <div class="stat-label">Opportunities</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value white">87%</div>
                        <div class="stat-label">Ø Confidence</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value blue">+8.4%</div>
                        <div class="stat-label">Avg EV</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Bar -->
            <div class="bottom-bar">
                <div class="social-info">
                    twitch.tv/<span>betradarmus</span> • Jeden Sonntag LIVE
                </div>
                <div class="time-info">
                    <div class="current-time">SONNTAG</div>
                    <div class="date-info">Live-Fußball intelligent analysiert</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
