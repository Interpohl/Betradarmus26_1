version: '3.8'

services:
  # MongoDB Datenbank
  mongodb:
    image: mongo:6
    container_name: betradarmus-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - betradarmus-network
    environment:
      - MONGO_INITDB_DATABASE=betradarmus

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: betradarmus-backend
    restart: always
    ports:
      - "8005:8001"
    depends_on:
      - mongodb
    networks:
      - betradarmus-network
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=betradarmus
    env_file:
      - ./backend/.env

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: betradarmus-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - betradarmus-network

networks:
  betradarmus-network:
    driver: bridge

volumes:
  mongodb_data:
